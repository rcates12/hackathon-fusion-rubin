name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint step removed when the repo was re-bootstrapped on the Pendo
      # seed kit (Next 15 + Tailwind 3 stack). The previous eslint config
      # was tied to eslint-config-next@16 flat-config subpaths that don't
      # exist in @15. Add a Next-15-compatible eslint config + restore
      # this step when lint enforcement becomes a priority.

      - name: Build
        run: npm run build
